<style>
:root {
  --bg-primary: #000000;
  --bg-card: #0d0d0d;
  --bg-hover: #1a1a1a;
  --border: #1a1a1a;
  --text-primary: #e8e8f0;
  --text-secondary: #888888;
  --text-muted: #555555;
  --accent-cyan: #22d3ee;
  --accent-green: #22c55e;
  --accent-red: #ef4444;
  --accent-orange: #f97316;
  --accent-teal: #2dd4bf;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }
html, body { overflow-x: hidden; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

.header { text-align: center; padding: 30px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.header .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 6px; }

.controls { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; align-items: flex-end; justify-content: center; }
.control-group { display: flex; flex-direction: column; gap: 6px; }
.control-group label { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }

.asset-buttons, .window-buttons { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
.asset-btn, .window-btn { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 8px 14px; background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.asset-btn:hover, .window-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.window-btn.active { background: var(--accent-cyan); color: #000; border-color: var(--accent-cyan); font-weight: 600; }
.asset-btn.active-slv { background: #c0c0c0; color: #000; border-color: #c0c0c0; font-weight: 600; }
.asset-btn.active-gld { background: #f59e0b; color: #000; border-color: #f59e0b; font-weight: 600; }

.info-bar { display: flex; gap: 24px; margin-bottom: 20px; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; flex-wrap: wrap; justify-content: center; }
.info-item { display: flex; flex-direction: column; gap: 2px; align-items: center; }
.info-item .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.info-item .value { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; }
.info-item .value.positive { color: var(--accent-orange); }
.info-item .value.negative { color: var(--accent-teal); }
.info-item .value.neutral  { color: var(--text-primary); }

/* 현재 상태 배너 */
.status-banner { display: none; margin-bottom: 16px; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; align-items: center; gap: 8px; justify-content: center; }
.status-banner.overvalued  { display: flex; background: rgba(249,115,22,0.08); border: 1px solid rgba(249,115,22,0.3); color: var(--accent-orange); }
.status-banner.undervalued { display: flex; background: rgba(45,212,191,0.08); border: 1px solid rgba(45,212,191,0.3); color: var(--accent-teal); }
.status-banner.neutral     { display: flex; background: rgba(136,136,136,0.06); border: 1px solid rgba(136,136,136,0.2); color: var(--text-secondary); }

.chart-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.chart-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.chart-title .dot { width: 8px; height: 8px; border-radius: 50%; }
.chart-title .dot.silver { background: #c0c0c0; }
.chart-title .dot.gold   { background: #f59e0b; }
.chart-title .dot.orange { background: var(--accent-orange); }
.chart-wrapper { position: relative; height: 300px; width: 100%; display: block; }
.chart-wrapper.zscore { height: 260px; width: 100%; display: block; }
.chart-wrapper canvas { display: block !important; }

.zscore-legend { display: flex; gap: 20px; margin-top: 8px; font-size: 11px; color: var(--text-muted); justify-content: center; flex-wrap: wrap; }
.zscore-legend span { display: flex; align-items: center; gap: 5px; }
.zscore-legend .box { width: 12px; height: 12px; border-radius: 2px; }
.zscore-legend .box.over  { background: rgba(249,115,22,0.5); border: 1px solid var(--accent-orange); }
.zscore-legend .box.under { background: rgba(45,212,191,0.5); border: 1px solid var(--accent-teal); }

.share-group { display: flex; justify-content: center; gap: 8px; margin: 20px 0; flex-wrap: wrap; }
.share-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg-card); color: var(--text-secondary); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; text-decoration: none; }

.footer { margin-top: 32px; padding: 16px 0; border-top: 1px solid var(--border); text-align: center; font-size: 11px; color: var(--text-muted); }

<script>
const SHARE_URL = 'https://herdvibe.com/116';

// ── 상태
let slvData = null, gldData = null;
let currentAsset = 'SLV';
let currentWindow = 504;
let priceChart = null, zscoreChart = null;

// ── 워터마크 플러그인
const watermarkPlugin = {
  id: 'watermark',
  afterDraw(chart) {
    const ctx = chart.ctx;
    ctx.save();
    ctx.font = '28px JetBrains Mono';
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Herdvibe.com', (chart.chartArea.left + chart.chartArea.right) / 2, (chart.chartArea.top + chart.chartArea.bottom) / 2);
    ctx.restore();
  }
};
Chart.register(watermarkPlugin);

// ── 공유
function openUrl(url) {
  try { const a = document.createElement('a'); a.href = url; a.target = '_top'; a.rel = 'noopener noreferrer'; document.body.appendChild(a); a.click(); document.body.removeChild(a); } catch(e) { try { window.top.location.href = url; } catch(e2) {} }
}
function doCopy(text) {
  try { window.parent.postMessage({type:'clipboard',text:text},'*'); } catch(e) {}
  try { if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(text); return; } } catch(e) {}
  try { const ta = document.createElement('textarea'); ta.value = text; ta.setAttribute('readonly',''); ta.style.cssText = 'position:fixed;left:0;top:0;opacity:0;width:1px;height:1px;'; document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0, ta.value.length); document.execCommand('copy'); document.body.removeChild(ta); } catch(e) { window.prompt('아래 링크를 복사하세요:', text); }
}
function doShare(platform) {
  const asset = currentAsset === 'SLV' ? '은(SLV)' : '금(GLD)';
  const t = `${asset} 금 대비 밸류에이션 분석 — 금은 밸류미터 | HerdVibe`;
  switch(platform) {
    case 'twitter':   openUrl(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}&url=${encodeURIComponent(SHARE_URL)}`); break;
    case 'kakao':     openUrl(`https://story.kakao.com/share?url=${encodeURIComponent(SHARE_URL)}`); break;
    case 'telegram':  openUrl(`https://t.me/share/url?url=${encodeURIComponent(SHARE_URL)}&text=${encodeURIComponent(t)}`); break;
    case 'instagram': doCopy(SHARE_URL); showToast('링크가 복사되었습니다 — 인스타그램에 붙여넣기 하세요'); break;
    case 'copy':      doCopy(SHARE_URL); showToast('링크가 복사되었습니다'); break;
  }
}
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

// ── 데이터 로드
async function loadCSV(path) {
  const resp = await fetch(path);
  if (!resp.ok) throw new Error(`Failed: ${path}`);
  const text = await resp.text();
  return Papa.parse(text, { header: true, dynamicTyping: true, skipEmptyLines: true }).data.filter(d => d.Date && d.Close);
}

async function init() {
  try {
    [slvData, gldData] = await Promise.all([
      loadCSV('data/SLV.csv'),
      loadCSV('data/GLD.csv'),
    ]);
    const last = slvData[slvData.length - 1];
    document.getElementById('lastUpdated').textContent = `Last updated: ${last.Date}`;
    // DOM 완전 렌더 후 차트 그리기 (iframe 환경 대응)
    setTimeout(renderAll, 500);
  } catch(e) {
    document.getElementById('lastUpdated').textContent = 'Data load error';
    console.error(e);
  }
}

// ── Z-Score 계산
function calcZscore(slv, gld, window) {
  // 날짜 기준 머지
  const gldMap = {};
  gld.forEach(d => gldMap[d.Date] = d.Close);

  const merged = slv
    .filter(d => gldMap[d.Date])
    .map(d => ({ date: d.Date, slv: d.Close, gld: gldMap[d.Date], ratio: d.Close / gldMap[d.Date] }));

  const result = [];
  for (let i = 0; i < merged.length; i++) {
    if (i < window - 1) { result.push({ ...merged[i], zscore: null }); continue; }
    const slice = merged.slice(i - window + 1, i + 1).map(d => d.ratio);
    const mean = slice.reduce((a, b) => a + b, 0) / slice.length;
    const std  = Math.sqrt(slice.map(v => (v - mean) ** 2).reduce((a, b) => a + b, 0) / slice.length);
    result.push({ ...merged[i], zscore: std > 0 ? (merged[i].ratio - mean) / std : 0 });
  }
  return result;
}

// ── 로컬 극값 라벨 찾기 (상위 N개 피크/밸리)
function findPeakLabels(data, topN = 5) {
  const valid = data.filter(d => d.zscore !== null);
  const labels = [];
  const minGap = Math.floor(valid.length / 20); // 최소 간격

  // 로컬 피크 탐색
  const peaks = [], valleys = [];
  for (let i = minGap; i < valid.length - minGap; i++) {
    const z = valid[i].zscore;
    const left  = valid.slice(Math.max(0, i - minGap), i).map(d => d.zscore);
    const right = valid.slice(i + 1, i + minGap + 1).map(d => d.zscore);
    if (z > Math.max(...left) && z > Math.max(...right)) peaks.push({ idx: i, z, date: valid[i].date });
    if (z < Math.min(...left) && z < Math.min(...right)) valleys.push({ idx: i, z, date: valid[i].date });
  }

  // 절대값 기준 상위 N개 선택
  peaks.sort((a, b) => b.z - a.z);
  valleys.sort((a, b) => a.z - b.z);

  peaks.slice(0, topN).forEach(p => labels.push({ idx: p.idx, z: p.z, type: 'peak' }));
  valleys.slice(0, topN).forEach(v => labels.push({ idx: v.idx, z: v.z, type: 'valley' }));
  return labels;
}

// ── 렌더링
function renderAll() {
  const baseData = currentAsset === 'SLV' ? slvData : gldData;
  const zData = calcZscore(slvData, gldData, currentWindow);

  // GLD 모드일 때는 Z-Score 부호 반전 (금이 은 대비 고평가/저평가)
  const displayZ = currentAsset === 'GLD'
    ? zData.map(d => ({ ...d, zscore: d.zscore !== null ? -d.zscore : null }))
    : zData;

  const validZ = displayZ.filter(d => d.zscore !== null);
  if (!validZ.length) return;

  // Info bar 업데이트
  const lastPrice = baseData[baseData.length - 1];
  const prevPrice = baseData[baseData.length - 2];
  const lastZ     = validZ[validZ.length - 1];
  const dc = lastPrice.Close - prevPrice.Close;
  const dp = (dc / prevPrice.Close) * 100;

  document.getElementById('infoPrice').textContent = `$${lastPrice.Close.toFixed(2)}`;
  const dcEl = document.getElementById('infoDayChange');
  dcEl.textContent = `${dc >= 0 ? '+' : ''}${dc.toFixed(2)} (${dp >= 0 ? '+' : ''}${dp.toFixed(2)}%)`;
  dcEl.className = `value ${dc >= 0 ? 'positive' : 'negative'}`;

  const zEl = document.getElementById('infoZscore');
  const zVal = lastZ.zscore;
  zEl.textContent = `${zVal >= 0 ? '+' : ''}${zVal.toFixed(2)}σ`;
  zEl.className = `value ${zVal > 0.5 ? 'positive' : zVal < -0.5 ? 'negative' : 'neutral'}`;

  document.getElementById('infoRatio').textContent = lastZ.ratio.toFixed(4);
  document.getElementById('infoRange').textContent = `${validZ[0].date} ~ ${lastZ.date}`;

  // 상태 배너
  const banner = document.getElementById('statusBanner');
  const statusText = document.getElementById('statusText');
  const assetName = currentAsset === 'SLV' ? '은' : '금';
  const vsName    = currentAsset === 'SLV' ? '금' : '은';
  if (zVal > 2) {
    banner.className = 'status-banner overvalued';
    statusText.textContent = `▲ 현재 ${assetName}은 ${vsName} 대비 역사적 고평가 구간 (+${zVal.toFixed(2)}σ)`;
  } else if (zVal < -2) {
    banner.className = 'status-banner undervalued';
    statusText.textContent = `▼ 현재 ${assetName}은 ${vsName} 대비 역사적 저평가 구간 (${zVal.toFixed(2)}σ)`;
  } else {
    banner.className = 'status-banner neutral';
    statusText.textContent = `현재 ${assetName}은 ${vsName} 대비 중립 구간 (${zVal >= 0 ? '+' : ''}${zVal.toFixed(2)}σ)`;
  }

  // 차트 타이틀
  const windowLabel = currentWindow === 252 ? '52주' : currentWindow === 504 ? '2년' : '5년';
  const dot = document.getElementById('priceDot');
  if (currentAsset === 'SLV') {
    dot.className = 'dot silver';
    document.getElementById('priceChartTitle').textContent = `SLV (은) — 가격`;
    document.getElementById('zscoreChartTitle').textContent = `${windowLabel} Z-Score · 금 대비 은 밸류에이션 (고평가 / 저평가)`;
  } else {
    dot.className = 'dot gold';
    document.getElementById('priceChartTitle').textContent = `GLD (금) — 가격`;
    document.getElementById('zscoreChartTitle').textContent = `${windowLabel} Z-Score · 은 대비 금 밸류에이션 (고평가 / 저평가)`;
  }

  // 가격 차트 데이터 (Z 데이터 날짜 범위에 맞춤)
  const zDateSet = new Set(validZ.map(d => d.date));
  const priceFiltered = baseData.filter(d => zDateSet.has(d.Date));
  const step = Math.max(1, Math.floor(validZ.length / 60));
  const priceLabels = priceFiltered.map((d, i) => i % step === 0 ? d.Date : '');
  const priceValues = priceFiltered.map(d => d.Close);

  // 가격 차트
  if (priceChart) priceChart.destroy();
  const priceColor = currentAsset === 'SLV' ? '#c0c0c0' : '#f59e0b';
  const priceCanvas = document.getElementById('priceChart');
  const priceW = Math.floor(window.innerWidth * 0.92);
  const priceH = window.innerWidth <= 768 ? 200 : 300;
  priceCanvas.setAttribute('width', priceW);
  priceCanvas.setAttribute('height', priceH);
  priceCanvas.style.width  = priceW + 'px';
  priceCanvas.style.height = priceH + 'px';
  priceChart = new Chart(priceCanvas.getContext('2d'), {
    type: 'line',
    data: { labels: priceLabels, datasets: [{ data: priceValues, borderColor: priceColor, borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 3, tension: 0, fill: false }] },
    options: mkBaseOpts(priceFiltered.map(d => d.Date), v => `$${v.toFixed(v >= 100 ? 0 : 2)}`)
  });

  // Z-Score 차트
  const zLabels  = validZ.map((d, i) => i % step === 0 ? d.date : '');
  const zValues  = validZ.map(d => d.zscore);
  const zColors  = zValues.map(v => v >= 0 ? 'rgba(249,115,22,0.55)' : 'rgba(45,212,191,0.55)');
  const zBorders = zValues.map(v => v >= 0 ? 'rgba(249,115,22,0.9)' : 'rgba(45,212,191,0.9)');

  // 피크 라벨 플러그인
  const peakLabels = findPeakLabels(validZ);
  const peakPlugin = {
    id: 'peakLabels',
    afterDatasetsDraw(chart) {
      const { ctx, scales: { x, y } } = chart;
      ctx.save();
      peakLabels.forEach(({ idx, z, type }) => {
        const xPos = x.getPixelForIndex(idx);
        const yPos = y.getPixelForValue(z);
        const isPeak = type === 'peak';
        const color  = isPeak ? 'rgba(249,115,22,1)' : 'rgba(45,212,191,1)';
        const label  = `${isPeak ? '▲' : '▼'} ${z >= 0 ? '+' : ''}${z.toFixed(1)}σ`;
        const yOffset = isPeak ? -14 : 14;

        ctx.font = 'bold 10px JetBrains Mono';
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.textBaseline = isPeak ? 'bottom' : 'top';
        ctx.fillText(label, xPos, yPos + yOffset);
      });
      ctx.restore();
    }
  };

  if (zscoreChart) zscoreChart.destroy();
  const zCanvas = document.getElementById('zscoreChart');
  const zH = window.innerWidth <= 768 ? 200 : 260;
  zCanvas.setAttribute('width', priceW);
  zCanvas.setAttribute('height', zH);
  zCanvas.style.width  = priceW + 'px';
  zCanvas.style.height = zH + 'px';
  zscoreChart = new Chart(zCanvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels: zLabels,
      datasets: [{
        data: zValues,
        backgroundColor: zColors,
        borderColor: zBorders,
        borderWidth: 1,
        barPercentage: 1.0,
        categoryPercentage: 1.0,
      }]
    },
    options: {
      ...mkBaseOpts(validZ.map(d => d.date), v => `${v >= 0 ? '+' : ''}${v.toFixed(1)}σ`, true),
      plugins: {
        ...mkBaseOpts(validZ.map(d => d.date), v => v, true).plugins,
        peakLabels: {},
        annotation: {},  // 기준선은 afterDraw로 직접 그림
      }
    },
    plugins: [peakPlugin, {
      id: 'refLines',
      afterDraw(chart) {
        const { ctx, scales: { x, y }, chartArea } = chart;
        ctx.save();
        [2, -2].forEach(level => {
          const yPos = y.getPixelForValue(level);
          ctx.beginPath();
          ctx.setLineDash([6, 4]);
          ctx.strokeStyle = level > 0 ? 'rgba(249,115,22,0.4)' : 'rgba(45,212,191,0.4)';
          ctx.lineWidth = 1;
          ctx.moveTo(chartArea.left, yPos);
          ctx.lineTo(chartArea.right, yPos);
          ctx.stroke();
          ctx.setLineDash([]);

          // 레벨 텍스트
          ctx.font = '9px JetBrains Mono';
          ctx.fillStyle = level > 0 ? 'rgba(249,115,22,0.6)' : 'rgba(45,212,191,0.6)';
          ctx.textAlign = 'left';
          ctx.textBaseline = level > 0 ? 'bottom' : 'top';
          ctx.fillText(`${level > 0 ? '+' : ''}${level}σ`, chartArea.left + 4, yPos);
        });
        // 0 기준선
        const y0 = y.getPixelForValue(0);
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(136,136,136,0.3)';
        ctx.lineWidth = 1;
        ctx.moveTo(chartArea.left, y0);
        ctx.lineTo(chartArea.right, y0);
        ctx.stroke();
        ctx.restore();
      }
    }]
  });
}

// ── 공통 차트 옵션
function mkBaseOpts(fullLabels, yCb, isBar = false) {
  return {
    responsive: false,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        mode: 'index', intersect: false,
        backgroundColor: '#18181b', titleColor: '#888', bodyColor: '#e8e8f0',
        borderColor: '#333', borderWidth: 1,
        titleFont: { family: "'JetBrains Mono'" },
        bodyFont:  { family: "'JetBrains Mono'" },
        callbacks: {
          title: items => fullLabels[items[0].dataIndex] || '',
          label: items => isBar
            ? `Z-Score: ${items.raw >= 0 ? '+' : ''}${items.raw.toFixed(2)}σ`
            : `$${items.raw.toFixed(2)}`
        }
      }
    },
    scales: {
      x: {
        grid: { color: '#1a1a1a', drawBorder: false },
        ticks: { color: '#52525b', font: { family: "'JetBrains Mono'", size: 10 }, maxRotation: 0 }
      },
      y: {
        position: 'right',
        grid: { color: '#1a1a1a', drawBorder: false },
        ticks: { color: '#52525b', font: { family: "'JetBrains Mono'", size: 10 }, callback: yCb }
      }
    },
    interaction: { mode: 'index', intersect: false }
  };
}

// ── 이벤트
document.addEventListener('DOMContentLoaded', () => {
  // 자산 버튼
  document.querySelectorAll('.asset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.asset-btn').forEach(b => b.className = 'asset-btn');
      currentAsset = btn.dataset.asset;
      btn.classList.add(currentAsset === 'SLV' ? 'active-slv' : 'active-gld');
      if (slvData && gldData) renderAll();
    });
  });

  // 기간 버튼
  document.querySelectorAll('.window-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.window-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentWindow = parseInt(btn.dataset.days);
      if (slvData && gldData) renderAll();
    });
  });

  // 리사이즈 시 재렌더링
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (slvData && gldData) renderAll();
    }, 200);
  });

  init();
});

// iframe 환경에서 완전 로드 후 추가 렌더 보험
window.addEventListener('load', () => {
  setTimeout(() => { if (slvData && gldData) renderAll(); }, 800);
});
</script>
